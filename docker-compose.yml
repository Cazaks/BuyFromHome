services:

  mysql:
    image: mysql:8.0
    container_name: buyfromHome-mysql
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - buyfromHome_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s  # gives MySQL time to fully start before checking

  backend:
    build: .
    container_name: buyfromHome-backend
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy  # waits for MySQL to be truly ready
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    networks:
      - buyfromHome_network

  frontend:
    build: ../BuyFromHomeFrontend_Project
    container_name: buyfromHome-frontend
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - buyfromHome_network

volumes:
  mysql_data:

networks:
  buyfromHome_network:
    driver: bridge